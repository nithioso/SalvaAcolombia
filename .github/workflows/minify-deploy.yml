name: Minificar y desplegar (opcional)

# Despliegue OPCIONAL que sirve una versión MINIFICADA del juego (código más
# difícil de leer/copiar). Es MANUAL (workflow_dispatch). Para usarlo:
#   1) En Settings → Pages, cambia "Source" a "GitHub Actions".
#   2) Ejecuta este workflow desde la pestaña Actions ("Run workflow").
# Mientras no lo actives, el sitio sigue sirviéndose desde la rama main (legible).

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Minificar HTML/CSS/JS
        run: |
          mkdir -p _site
          [ -d assets ] && cp -r assets _site/assets || true
          npx --yes html-minifier-terser@7 \
            --collapse-whitespace --remove-comments \
            --minify-css true --minify-js true \
            -o _site/index.html index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
